<div class="modal-overlay" (click)="closed.emit()">
    <div class="modal" (click)="$event.stopPropagation()">
        <h3>Create Task</h3>

        <form class="form">
            <div class="form-group">
                <label class="form-label">Title</label>
                <input type="text" [(ngModel)]="taskModel.title" name="title" />
            </div>

            <div class="form-group">
                <label class="form-label">Description</label>
                <textarea [(ngModel)]="taskModel.description" name="description"></textarea>
            </div>

            <div class="form-group">
                <label class="form-label">Priority</label>
                <select [(ngModel)]="taskModel.priority" name="priority">
                    <option value="Low">Low</option>
                    <option value="Medium">Medium</option>
                    <option value="High">High</option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label">Due Date</label>
                <input type="date" [(ngModel)]="taskModel.dueDate" name="dueDate" />
            </div>

            <div class="form-group">
                <label class="form-label">Assign To</label>
                <select [(ngModel)]="taskModel.assignedToId" name="assignedToId">
                    <option value="">Select member</option>
                    @for (member of members(); track member.memberId) {
                    <option [value]="member.memberId">{{ member.memberName }}</option>
                    }
                </select>
            </div>

            @if(successMessage){
            <p class="alert alert-success">{{ successMessage }}</p>
            }

            <div class="form-actions">
                <button type="button" class="btn btn-primary" (click)="createTask()" [disabled]="!isFormValid()">Create</button>
                <button type="button" class="btn btn-ghost" (click)="closed.emit()">Cancel</button>
            </div>

            @if(errorMessage(); as errors) {
            @if(errors.length > 0) {
            <ul class="alert alert-error modal-error">
                @for (error of errors; track error) {
                <li>{{ error }}</li>
                }
            </ul>
            }
            }
        </form>
    </div>
</div>
