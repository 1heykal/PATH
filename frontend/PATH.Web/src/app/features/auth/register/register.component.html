<div class="auth-layout">

    <div class="auth-container">

        <div class="auth-header">

            <a routerLink="/" class="auth-brand">
                PATH
            </a>

            <h1>Create your account</h1>

            <p class="auth-subtitle">
                Join PATH and start organizing your teams, projects, and tasks.
            </p>

        </div>

        <div class="auth-card">

            <form class="form" method="post" (ngSubmit)="register()">

                <div class="form-row">

                    <div class="form-group">
                        <label class="form-label" for="firstName">
                            First Name
                        </label>

                        <input id="firstName" type="text" name="FirstName" [(ngModel)]="registerModel.FirstName"
                            placeholder="John">
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="lastName">
                            Last Name
                        </label>

                        <input id="lastName" type="text" name="LastName" [(ngModel)]="registerModel.LastName"
                            placeholder="Doe">
                    </div>

                </div>

                <div class="form-group">

                    <label class="form-label" for="email">
                        Email
                    </label>

                    <input id="email" type="email" name="Email" placeholder="john@example.com"
                        [(ngModel)]="registerModel.Email">

                </div>

                <div class="form-group">

                    <label class="form-label" for="birthDate">
                        Birth Date
                    </label>

                    <input id="birthDate" type="date" name="DateOfBirth" [(ngModel)]="registerModel.DateOfBirth">

                </div>

                <div class="form-row">

                    <div class="form-group">

                        <label class="form-label" for="password">
                            Password
                        </label>

                        <input id="password" type="password" name="Password" placeholder="Create a password"
                            [(ngModel)]="registerModel.Password">

                    </div>

                    <div class="form-group">

                        <label class="form-label" for="confirmPassword">
                            Confirm Password
                        </label>

                        <input id="confirmPassword" type="password" name="ConfirmPassword" placeholder="Repeat password"
                            (change)="checkPasswords()" [(ngModel)]="registerModel.ConfirmPassword">

                    </div>

                </div>

                @if (errorMessage(); as errors) {
                @if (errors.length > 0) {

                <ul class="alert alert-error">

                    @for (error of errors; track error) {

                    <li>{{ error }}</li>

                    }

                </ul>

                }
                }

                <button type="submit" class="btn btn-primary btn-block" [disabled]="!isFormValid()">

                    Create Account

                </button>

            </form>

        </div>

        <div class="auth-footer">

            <p>

                Already have an account?

                <a routerLink="/login">
                    Sign in
                </a>

            </p>

        </div>

    </div>

</div>
