<div class="auth-layout">

    <div class="auth-container">

        <div class="auth-header">

            <a (click)="logoClicked()" class="auth-brand">
                PATH
            </a>

            <h1>Welcome back</h1>

            <p class="auth-subtitle">
                Sign in to continue managing your organizations, projects, and tasks.
            </p>

        </div>

        <div class="auth-card">

            <form class="form" method="post" (ngSubmit)="login()">

                <div class="form-group">

                    <label class="form-label" for="email">

                        Email

                    </label>

                    <input id="email" type="email" name="Email" placeholder="john@example.com"
                        [(ngModel)]="accessModel.Email">

                </div>

                <div class="form-group">

                    <label class="form-label" for="password">

                        Password

                    </label>

                    <input id="password" type="password" name="Password" placeholder="Enter your password"
                        [(ngModel)]="accessModel.Password">

                </div>

                @if (errorMessage(); as errors) {
                @if (errors.length > 0) {

                <ul class="alert alert-error">

                    @for (error of errors; track error) {

                    <li>{{ error }}</li>

                    }

                </ul>

                }
                }

                <button type="submit" class="btn btn-primary btn-block" [disabled]="!isFormValid()">

                    Sign In

                </button>

            </form>

        </div>

        <div class="auth-footer">

            <p>

                Don't have an account?

                <a routerLink="/register">

                    Create one

                </a>

            </p>

        </div>

    </div>

</div>
