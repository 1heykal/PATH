<div class="page-header">
    <h2>New Project</h2>
</div>

<form class="form project-form" (ngSubmit)="createProject()">
    <div class="form-group">
        <label class="form-label" for="name">Project Name</label>
        <input type="text" id="name" [(ngModel)]="projectModel.name" name="name" required />
    </div>

    <div class="form-group">
        <label class="form-label" for="description">Description</label>
        <textarea id="description" [(ngModel)]="projectModel.description" name="description"></textarea>
    </div>

    <div class="form-actions">
        <button type="submit" class="btn btn-primary" [disabled]="!userAllowedToCreateProject || !isFormValid()">Create Project</button>
    </div>
</form>

@if(successMessage){
<p class="alert alert-success">{{ successMessage }}</p>
}

@if(errorMessage(); as errors) {
@if(errors.length > 0) {
<ul class="alert alert-error">
    @for (error of errors; track error) {
    <li>{{ error }}</li>
    }
</ul>
}
}
